# DB_PORT в selection-service всегда 5432: это порт внутри контейнера Postgres.
# Сопоставление "5436:5432" публикует 5436 только на хосте (доступ с машины разработчика).
# Если меняете POSTGRES_* при уже существующем томе postgres_data, инит не перезапускается —
# сделайте: docker compose down -v && docker compose up -d

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: selection_service
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: selection_service
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selection_service -d selection_service"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  selection-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8082:8080"
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      APP_NAME: "selection-service"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "selection_service"
      DB_USER: "selection_service"
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_USE_TLS: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
